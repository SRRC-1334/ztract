<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ztract logo">
  <title>Ztract — Mainframe EBCDIC Extraction</title>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="#000000" opacity="0.18"/>
    </pattern>
    <linearGradient id="zgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff6e"/>
      <stop offset="100%" stop-color="#00cc41"/>
    </linearGradient>
  </defs>

  <!-- Main background — near-black with faint green atmosphere -->
  <rect width="800" height="200" rx="10" fill="#030b05"/>

  <!-- Ambient glow behind Z -->
  <ellipse cx="108" cy="100" rx="90" ry="80" fill="#00ff41" opacity="0.025" filter="url(#softglow)"/>

  <!-- Scanline overlay -->
  <rect width="800" height="200" rx="10" fill="url(#scanlines)"/>

  <!-- Terminal corner brackets -->
  <path d="M 22 38 L 22 22 L 38 22" stroke="#1e4a1e" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <path d="M 762 22 L 778 22 L 778 38" stroke="#1e4a1e" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <path d="M 22 162 L 22 178 L 38 178" stroke="#1e4a1e" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <path d="M 762 178 L 778 178 L 778 162" stroke="#1e4a1e" stroke-width="1.5" fill="none" stroke-linecap="square"/>

  <!-- Z Lettermark — phosphor green, geometric stroke -->
  <g filter="url(#glow)">
    <path d="M 52 45 H 162 L 52 155 H 162"
          stroke="url(#zgrad)"
          stroke-width="21"
          stroke-linecap="square"
          stroke-linejoin="miter"
          fill="none"/>
  </g>

  <!-- Subtle Z inner highlight -->
  <path d="M 52 45 H 162 L 52 155 H 162"
        stroke="#c8ffda"
        stroke-width="4"
        stroke-linecap="square"
        fill="none"
        opacity="0.2"/>

  <!-- Vertical rule between icon and text -->
  <line x1="202" y1="42" x2="202" y2="158" stroke="#1a3a1a" stroke-width="1.2"/>

  <!-- ZTRACT wordmark — monospace, bold, phosphor -->
  <text x="226" y="108"
        font-family="'Courier New', Courier, monospace"
        font-size="54"
        font-weight="700"
        fill="#00ff41"
        filter="url(#glow)"
        letter-spacing="6">ZTRACT</text>

  <!-- Tagline -->
  <text x="228" y="136"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        fill="#4a7a4a"
        letter-spacing="0.8">Mainframe EBCDIC extraction · Zero MIPS · Real copybooks</text>

  <!-- Simulated terminal command -->
  <text x="228" y="158"
        font-family="'Courier New', Courier, monospace"
        font-size="11.5"
        fill="#1e4a1e"
        letter-spacing="0.3">$ ztract convert --copybook CUSTMAST.cpy --codepage cp277 --output data.csv</text>

  <!-- Blinking cursor block -->
  <rect x="708" y="148" width="9" height="12" fill="#00ff41" opacity="0.75"/>

  <!-- Right side: raw hex dump decoration (evokes EBCDIC) -->
  <text x="698" y="62" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#1a3a1a" letter-spacing="1">C3 E4 E2 E3</text>
  <text x="698" y="77" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#1a3a1a" letter-spacing="1">D4 C1 E2 E3</text>
  <text x="698" y="92" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#132913" letter-spacing="1">40 C6 C2 40</text>
  <text x="698" y="107" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#132913" letter-spacing="1">D5 96 D4 40</text>
  <text x="698" y="122" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#1a3a1a" letter-spacing="1">0C 12 34 5F</text>
  <text x="698" y="137" font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#132913" letter-spacing="1">C1 C2 C3 D4</text>

  <!-- Small decode arrow between hex columns -->
  <text x="686" y="100" font-family="'Courier New', Courier, monospace" font-size="10" fill="#1e4a1e">→</text>

  <!-- Bottom accent bar under the Z width -->
  <rect x="52" y="170" width="110" height="2.5" rx="1" fill="#00cc41" opacity="0.35"/>
</svg>
